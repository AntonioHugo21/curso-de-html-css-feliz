<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hugo Pierre</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&family=Press+Start+2P&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/assets/css/reset.css">
    <link rel="stylesheet" href="/assets/css/index.css">
    <link rel="stylesheet" href="/assets/css/components/header.css">
    <link rel="stylesheet" href="/assets/css/components/main-banner.css">
    <link rel="stylesheet" href="/assets/css/components/section.css">
    <link rel="stylesheet" href="/assets/css/components/button.css">
    <link rel="stylesheet" href="/assets/css/components/main-title.css">
    <link rel="stylesheet" href="/assets/css/components/subtitle.css">
    <link rel="stylesheet" href="/assets/css/components/box.css">
    <link rel="stylesheet" href="/assets/css/components/main-action.css">
    <link rel="stylesheet" href="/assets/css/components/wrapper-skill.css">
    <link rel="stylesheet" href="/assets/css/components/skill-tec.css">
    <link rel="stylesheet" href="/assets/css/components/progress-bar.css">
    <link rel="stylesheet" href="/assets/css/components/wrapper-card.css">
    <link rel="stylesheet" href="/assets/css/components/card-project.css">
</head>

<body>
    <header class="header">
        <img src="/assets/img/logo-2.png" alt="">

        <nav>
            <a class="main-action" href="" lang="en">Skills</a>
            <a class="main-action" href="">Projetos</a>
            <a class="main-action" href="">Sobre</a>
            <a class="main-action" href="">Contatos</a>
            <a class="button" href="" lang="en">Download CV</a>
        </nav>
    </header>

    <section class="main-banner">
        <div class="wrapper">
            <div class="box">
                <h1 class="main-title">Hugo Pierre</h1>
                <h2 class="subtitle">FrontEnd Developer</h2>
            </div>
            
            <div class="navigation">
                <a class="button" href="" lang="en">Download CV</a>
                <a class="button" href="" lang="en">Contatos</a>
            </div>
        </div>
    </section>

    <section class="section">
        <h2 class="main-title -second">Skills</h2>

        <div class="wrapper-skill">
            <article class="skill-tec"> <!--Description list-->
                <img class="icon" src="/assets/img/icons/ico_html5.png" alt="ico_html5">
                <div class="right">
                    <h3 class="title">HTML</h3>
                    <progress class="progress-bar" value="70" max="100">
                        70%
                    </progress>
                </div>
            </article>

            <article class="skill-tec"> <!--Description list-->
                <img class="icon" src="/assets/img/icons/ico_nodejs.png" alt="ico_nodejs">
                <div class="right">
                    <h3 class="title">NodeJS</h3>
                    <progress class="progress-bar" value="70" max="100">
                        70%
                    </progress>
                </div>
            </article>

            <article class="skill-tec"> <!--Description list-->
                <img class="icon" src="/assets/img/icons/ico_css3.png" alt="ico_css3">
                <div class="right">
                    <h3 class="title">CSS</h3>
                    <progress class="progress-bar" value="70" max="100">
                        70%
                    </progress>
                </div>
            </article>

            <article class="skill-tec"> <!--Description list-->
                <img class="icon" src="/assets/img/icons/ico_tdd.png" alt="ico_tdd">
                <div class="right">
                    <h3 class="title">TDD</h3>
                    <progress class="progress-bar" value="70" max="100">
                        70%
                    </progress>
                </div>
            </article>

            <article class="skill-tec"> <!--Description list-->
                <img class="icon" src="/assets/img/icons/ico_js.png" alt="ico_js">
                <div class="right">
                    <h3 class="title">JavaScript</h3>
                    <progress class="progress-bar" value="70" max="100">
                        70%
                    </progress>
                </div>
            </article>

            <article class="skill-tec"> <!--Description list-->
                <img class="icon" src="/assets/img/icons/ico_restapi.png" alt="ico_restapi">
                <div class="right">
                    <h3 class="title">Rest API</h3>
                    <progress class="progress-bar" value="70" max="100">
                        70%
                    </progress>
                </div>
            </article>

            <article class="skill-tec"> <!--Description list-->
                <img class="icon" src="/assets/img/icons/ico_react.png" alt="ico_react">
                <div class="right">
                    <h3 class="title">React</h3>
                    <progress class="progress-bar" value="70" max="100">
                        70%
                    </progress>
                </div>
            </article>

            <article class="skill-tec"> <!--Description list-->
                <img class="icon" src="/assets/img/icons/ico_ux.png" alt="ico_ux">
                <div class="right">
                    <h3 class="title">UX</h3>
                    <progress class="progress-bar" value="70" max="100">
                        70%
                    </progress>
                </div>
            </article>
        </div>
    </section>
    
    <section class="section -bgBlack">
        <h2 class="main-title -second">Projetos</h2>

        <div class="wrapper-card">
            <a href="https://github.com/AntonioHugo21/projeto-flex-grid-academy" target="_blank">
                <figure class="card-project">
                    <img class="logo" src="/assets/img/logo-projeto-flex-grid-academy.png" alt="Logo projeto flex-grid-academy">
                </figure>
            </a>
            
            <a href="https://github.com/AntonioHugo21/projeto-final" target="_blank">
                <figure class="card-project -blue">
                    <img class="logo" src="/assets/img/logo-solartech.png" alt="Logo projeto solartech">
                </figure>
            </a>

            <a href="https://github.com/AntonioHugo21/curso-de-html-css-feliz" target="_blank">
                <figure class="card-project">
                    <img class="logo" src="/assets/img/foto.png" alt="Logo projeto portifolio">
                </figure>
            </a>
        </div>
    </section>

</html>
